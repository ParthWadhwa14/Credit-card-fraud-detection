name: Build and Publish Docker Images

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  docker-publish:
    name: Build and Push FastAPI and Streamlit Images
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push FastAPI image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/fraud-detection-api:latest
            ${{ vars.DOCKERHUB_USERNAME }}/fraud-detection-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Streamlit image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.streamlit
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/fraud-streamlit-ui:latest
            ${{ vars.DOCKERHUB_USERNAME }}/fraud-streamlit-ui:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max